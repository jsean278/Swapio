<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Complete your Swapio gift card swap. Enter your card details and payout info to receive cash via PayPal, Cash App, Zelle, Venmo, Bitcoin, or bank transfer.">
  <meta property="og:title" content="Complete Your Swap — Swapio">
  <meta property="og:description" content="Enter your gift card details to finish your Swapio swap and get paid fast.">
  <meta property="og:image" content="/assets/logo.png">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/logo.png">
  <title>Complete Your Swap — Swapio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'swapio-dark': '#2D467B',
            'swapio-light': '#78A5D3',
            'swapio-bg': '#F8FAFC',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="text-gray-800" data-page="sell">

  <div id="site-header"></div>

  <section class="page-hero page-enter">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-swapio-dark">Complete Your Swap</h1>
      <p class="text-gray-500 mt-4 max-w-xl mx-auto text-lg">
        Enter your details below to continue
      </p>
    </div>
  </section>

  <section id="swap" class="pb-12 md:pb-16">
    <div class="max-w-xl mx-auto px-4 sm:px-6">
      <div class="swap-box p-5 sm:p-6 md:p-8">

        <div id="swap-form-section" class="swap-step swap-step-active">
          <div id="form-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg" role="alert"></div>

          <form id="submission-form" class="space-y-4" novalidate>
            <div id="card-fields-container" class="space-y-4"></div>

            <div class="field-wrapper">
              <label class="form-label" for="full-name">Full Name <span class="text-red-500">*</span></label>
              <input type="text" id="full-name" name="fullName" class="form-input" placeholder="Your full name" data-validate="required" data-error-message="Please enter your full name">
            </div>

            <div class="field-wrapper">
              <label class="form-label" for="email">Email <span class="text-red-500">*</span></label>
              <input type="text" id="email" name="email" class="form-input" placeholder="you@email.com" inputmode="email" autocomplete="email" data-validate="email">
            </div>

            <div>
              <label class="form-label" for="form-payout-method">Payout Method</label>
              <input type="text" id="form-payout-method" class="form-input form-input-selected" readonly>
            </div>

            <div id="payout-fields-container" class="space-y-4"></div>

            <button type="submit" id="submit-btn" class="btn-primary w-full py-3.5 sm:py-4 text-base">
              Submit Swap
            </button>
          </form>

          <p class="text-xs text-gray-400 text-center mt-4">
            By submitting, you agree to our <a href="/terms.html" class="text-swapio-dark underline">Terms of Service</a>.
          </p>

          <a href="/index.html#swap" class="block w-full text-center text-sm text-gray-500 hover:text-swapio-dark mt-4 transition-colors py-2">
            ← Back to offer
          </a>
        </div>

        <div id="success-screen" class="swap-step success-screen">
          <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 sm:w-8 sm:h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <h2 class="text-xl sm:text-2xl font-bold text-swapio-dark">Swap Submitted Successfully!</h2>
          <p class="text-gray-500 mt-3 max-w-sm mx-auto text-sm sm:text-base">
            We'll verify your card and send your cash within hours.
          </p>
          <p class="text-sm text-gray-400 mt-6">Your order code</p>
          <div id="success-order-code" class="order-code text-xl sm:text-2xl"></div>
          <p class="text-sm text-gray-500">
            You'll receive <span id="success-payout" class="font-semibold text-swapio-dark"></span>
          </p>
          <p class="text-xs text-gray-400 mt-4 px-2">Save your order code for reference.</p>
          <button type="button" id="start-another-swap" class="btn-secondary mt-6 sm:mt-8 w-full sm:w-auto">Start Another Swap</button>
        </div>

      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="/js/shared.js"></script>
  <script src="/js/card-requirements.js"></script>
  <script src="/js/validation.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
