<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Log in to your Swapio account to track gift card submissions and payouts.">
  <meta property="og:title" content="Log In — Swapio">
  <meta property="og:image" content="https://swapio.cc/assets/logo-512.png">
  <meta property="og:site_name" content="Swapio">
  <meta property="og:locale" content="en_US">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/assets/logo-180.png">
  <title>Log In — Swapio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'swapio-dark': '#2D467B',
            'swapio-light': '#78A5D3',
            'swapio-bg': '#F8FAFC',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="text-gray-800" data-page="login">

  <div id="site-header">
<header class="site-header">
  <nav class="header-nav" aria-label="Main navigation"><a href="/" aria-current="page">Home</a><a href="/guide">Guide</a><a href="/faq">FAQ</a><a href="/articles/">Articles</a><a href="/feedback">Feedback</a><a href="/contact">Reach Us</a></nav>
</header>
</div>

  <section class="page-hero page-hero--plain page-enter">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-swapio-dark">Log In</h1>
      <p class="text-gray-500 mt-4 max-w-xl mx-auto text-lg">Access your dashboard and track your swaps.</p>
    </div>
  </section>

  <section class="pb-12 md:pb-16">
    <div class="max-w-md mx-auto px-4 sm:px-6">
      <div class="swap-box auth-card p-6 sm:p-8">
        <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg" role="alert"></div>

        <form id="login-form" class="space-y-4" novalidate>
          <div class="field-wrapper">
            <label class="form-label" for="login-email">Email <span class="text-red-500">*</span></label>
            <input type="text" id="login-email" name="email" class="form-input" placeholder="you@email.com" inputmode="email" autocomplete="email" required>
          </div>

          <div class="field-wrapper">
            <label class="form-label" for="login-password">Password <span class="text-red-500">*</span></label>
            <input type="password" id="login-password" name="password" class="form-input" placeholder="At least 6 characters" autocomplete="current-password" minlength="6" required>
          </div>

          <button type="submit" class="btn-primary w-full py-3.5">Log In</button>
        </form>

        <p class="text-sm text-gray-500 text-center mt-6">
          Don't have an account?
          <a href="/signup" class="text-swapio-dark font-semibold hover:text-swapio-light transition-colors">Sign up</a>
        </p>
      </div>
    </div>
  </section>

  <div id="site-footer">
<footer class="site-footer">
  <div class="footer-links">
    <a href="/guide">Guide</a>
    <a href="/faq">FAQ</a>
    <a href="/articles/">Articles</a>
    <a href="/feedback">Feedback</a>
    <a href="/contact">Reach Us</a>
    <a href="/terms">Terms</a>
    <a href="/privacy">Privacy</a>
  </div>
  <p class="footer-copy">Swapio — turn unused gift cards into cash. 95% payout via PayPal, Cash App, Zelle, Venmo, Bitcoin, or bank transfer.</p>
</footer>
</div>

  <script src="/js/auth.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/auth-pages.js"></script>
</body>
</html>
