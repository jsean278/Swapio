<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Create a Swapio account to track your gift card submissions and payouts.">
  <meta property="og:title" content="Sign Up — Swapio">
  <meta property="og:image" content="/assets/logo.png">
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <title>Sign Up — Swapio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'swapio-dark': '#2D467B',
            'swapio-light': '#78A5D3',
            'swapio-bg': '#F8FAFC',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="text-gray-800" data-page="signup">

  <div id="site-header"></div>

  <section class="page-hero page-hero--plain page-enter">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-swapio-dark">Create Account</h1>
      <p class="text-gray-500 mt-4 max-w-xl mx-auto text-lg">Track submissions, view status, and manage your swaps.</p>
    </div>
  </section>

  <section class="pb-12 md:pb-16">
    <div class="max-w-md mx-auto px-4 sm:px-6">
      <div class="swap-box auth-card p-6 sm:p-8">
        <div id="signup-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg" role="alert"></div>

        <form id="signup-form" class="space-y-4" novalidate>
          <div class="field-wrapper">
            <label class="form-label" for="signup-username">Username <span class="text-red-500">*</span></label>
            <input type="text" id="signup-username" name="username" class="form-input" placeholder="yourname" autocomplete="username" minlength="3" maxlength="24" required>
            <p class="text-xs text-gray-400 mt-1">3–24 characters · letters, numbers, underscore</p>
          </div>

          <div class="field-wrapper">
            <label class="form-label" for="signup-email">Email <span class="text-red-500">*</span></label>
            <input type="text" id="signup-email" name="email" class="form-input" placeholder="you@email.com" inputmode="email" autocomplete="email" required>
          </div>

          <div class="field-wrapper">
            <label class="form-label" for="signup-password">Password <span class="text-red-500">*</span></label>
            <input type="password" id="signup-password" name="password" class="form-input" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required>
          </div>

          <button type="submit" class="btn-primary w-full py-3.5">Create Account</button>
        </form>

        <p class="text-sm text-gray-500 text-center mt-6">
          Already have an account?
          <a href="/login.html" class="text-swapio-dark font-semibold hover:text-swapio-light transition-colors">Log in</a>
        </p>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/auth-pages.js"></script>
</body>
</html>
