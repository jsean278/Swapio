<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Swapio turns unused gift cards into cash fast. Get 95% of your card value paid via PayPal, Cash App, Zelle, Venmo, Bitcoin, or bank transfer. 60+ brands accepted.">
  <meta name="keywords" content="gift card to cash, sell gift cards, Swapio, PayPal payout, Cash App, Zelle">
  <meta property="og:title" content="Swapio — Turn Unused Gift Cards Into Cash Fast">
  <meta property="og:description" content="Swap unused gift cards for real cash. 95% payout, 60+ brands, paid within hours via PayPal, Cash App, Zelle, Venmo, Bitcoin, or bank transfer.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/logo.webp">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Swapio — Turn Unused Gift Cards Into Cash Fast">
  <meta name="twitter:description" content="Swap unused gift cards for real cash. 95% payout, 60+ brands, paid within hours.">
  <link rel="icon" href="/assets/logo.webp" type="image/webp">
  <link rel="apple-touch-icon" href="/assets/logo.webp">
  <title>Swapio — Turn Unused Gift Cards Into Cash Fast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'swapio-dark': '#2D467B',
            'swapio-light': '#78A5D3',
            'swapio-bg': '#F8FAFC',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="text-gray-800" data-page="home">

  <div id="site-header"></div>

  <section class="page-hero page-hero--plain page-enter">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-swapio-dark">Turn Unused Gift Cards Into Cash Fast</h1>
      <p class="text-gray-500 mt-4 max-w-xl mx-auto text-lg">
        Swap your unused gift cards for real cash via PayPal, Cash App, Zelle, Venmo, Bitcoin, or Bank Transfer. Safe, simple, and paid quickly.
      </p>
    </div>
  </section>

  <section id="swap" class="pt-3 md:pt-5 pb-12 md:pb-16">
    <div class="max-w-xl mx-auto px-4 sm:px-6">
      <div class="swap-box p-5 sm:p-6 md:p-8">

        <div id="swap-box-step1" class="swap-step swap-step-active">
          <h2 class="text-lg sm:text-xl font-bold text-swapio-dark mb-5 sm:mb-6 text-center">Start Your Swap</h2>

          <div id="swap-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg" role="alert"></div>

          <div class="space-y-5">
            <div>
              <label class="form-label" for="brand-search">Gift Card Brand</label>
              <div class="dropdown-wrapper">
                <input type="text" id="brand-search" class="form-input" placeholder="Search for your brand..." autocomplete="off" role="combobox" aria-expanded="false">
                <div id="brand-list" class="dropdown-list" role="listbox"></div>
              </div>
            </div>

            <div>
              <label class="form-label" for="balance-input">Card Balance</label>
              <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium">$</span>
                <input type="text" id="balance-input" class="form-input pl-8" placeholder="10 – 5000" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
              </div>
              <p class="text-xs text-gray-400 mt-1">Minimum $10 · Maximum $5,000</p>
            </div>

            <div>
              <label class="form-label" for="payout-search">Payout Method</label>
              <div class="dropdown-wrapper">
                <input type="text" id="payout-search" class="form-input" placeholder="Select payout method..." autocomplete="off" role="combobox" aria-expanded="false">
                <div id="payout-list" class="dropdown-list dropdown-list--up" role="listbox"></div>
              </div>
            </div>

            <button type="button" id="get-offer-btn" class="btn-primary w-full py-3.5 sm:py-4 text-base" disabled>
              Get My Cash Offer →
            </button>
          </div>
        </div>

        <div id="offer-preview" class="swap-step">
          <h2 class="text-lg sm:text-xl font-bold text-swapio-dark mb-5 sm:mb-6 text-center">Your Cash Offer</h2>
          <div class="offer-preview space-y-4">
            <div class="flex justify-between items-center gap-4">
              <span class="text-gray-500 text-sm sm:text-base">Your Card</span>
              <span id="preview-card" class="font-bold text-base sm:text-lg text-swapio-dark text-right"></span>
            </div>
            <div class="border-t site-divider"></div>
            <div class="flex justify-between items-center gap-4">
              <span class="text-gray-500 text-sm sm:text-base">You'll Receive</span>
              <span id="preview-payout" class="font-bold text-base sm:text-lg text-swapio-dark text-right"></span>
            </div>
          </div>
          <button id="continue-btn" class="btn-primary w-full py-3.5 sm:py-4 text-base mt-6">
            Continue to Submit →
          </button>
          <button id="back-to-swap" type="button" class="w-full text-center text-sm text-gray-500 hover:text-swapio-dark mt-3 transition-colors py-2">
            ← Start over
          </button>
        </div>

      </div>
    </div>
  </section>

  <div id="stats-bar"></div>
  <div id="process-steps"></div>
  <div id="trust-signals"></div>
  <div id="site-footer"></div>

  <script src="/js/shared.js"></script>
  <script src="/js/card-requirements.js"></script>
  <script src="/js/validation.js"></script>
  <script src="/js/dropdown.js"></script>
  <script src="/js/home.js"></script>
</body>
</html>
